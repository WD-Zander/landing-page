<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);font-family:var(--font-body);color:var(--text-secondary);}
  .card{padding:24px;display:flex;align-items:center;gap:28px;}
  .logo-big{font-family:var(--font-heading);font-size:64px;font-weight:800;letter-spacing:-0.03em;color:var(--text-primary);line-height:1;}
  .logo-big .a{background:linear-gradient(135deg,#f59e0b,#fbbf24);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .alt{display:flex;flex-direction:column;gap:10px;align-items:flex-start;}
  .lockup-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg-elevated);}
  .favicon{width:32px;height:32px;border-radius:8px;background:#0f172a;display:flex;align-items:center;justify-content:center;font-family:var(--font-heading);font-weight:700;font-size:15px;color:#f0f0f5;letter-spacing:-0.04em;}
  .lockup-row .logo-sm{font-family:var(--font-heading);font-weight:700;font-size:20px;color:var(--text-primary);letter-spacing:-0.02em;}
  .lockup-row .logo-sm .a{color:var(--accent-amber);}
  .meta{display:flex;flex-direction:column;gap:6px;}
  .meta .label{font-family:var(--font-display);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-amber);}
  .meta .val{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
</style></head>
<body><div class="card">
  <div class="logo-big">SC<span class="a">AF</span></div>
  <div class="alt">
    <div class="lockup-row"><span class="favicon">SC</span><span class="logo-sm">SC<span class="a">AF</span></span></div>
    <div class="meta">
      <span class="label">Wordmark · Outfit 800</span>
      <span class="val">letter-spacing: -0.03em &nbsp; AF: amber gradient</span>
    </div>
  </div>
</div></body></html>
