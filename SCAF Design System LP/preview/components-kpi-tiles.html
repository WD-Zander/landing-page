<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);font-family:var(--font-body);color:var(--text-secondary);}
  .card{padding:22px 24px;}
  h4{font-family:var(--font-display);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-amber);margin:0 0 14px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .kpi{padding:14px;border-radius:8px;background:#fff;border:1px solid #e4e4e7;}
  .label{font-size:9.5px;color:#71717a;margin-bottom:4px;font-family:var(--font-body);}
  .val{font-family:var(--font-mono);font-size:24px;font-weight:600;line-height:1;}
  .blue{color:#2563eb;}.green{color:#15803d;}.amber{color:#b45309;}.red{color:#b91c1c;}
  .note{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:12px;text-align:center;}
</style></head>
<body><div class="card">
  <h4>KPI tiles · always inside light mockup, mono numerals</h4>
  <div class="grid">
    <div class="kpi"><div class="label">Activos totales</div><div class="val blue">1,247</div></div>
    <div class="kpi"><div class="label">Valor total (USD)</div><div class="val green">$2.4M</div></div>
    <div class="kpi"><div class="label">Mant. pendientes</div><div class="val amber">38</div></div>
    <div class="kpi"><div class="label">Alertas vencidas</div><div class="val red">5</div></div>
  </div>
  <div class="note">blue · informational &nbsp;·&nbsp; green · financial / good &nbsp;·&nbsp; amber · attention &nbsp;·&nbsp; red · overdue</div>
</div></body></html>
