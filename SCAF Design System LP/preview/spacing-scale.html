<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);font-family:var(--font-body);color:var(--text-secondary);}
  .card{padding:24px;}
  h4{font-family:var(--font-display);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-amber);margin:0 0 14px;}
  .row{display:flex;align-items:flex-end;gap:14px;}
  .step{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:3px;width:28px;}
  .label{font-family:var(--font-mono);font-size:10px;color:var(--text-primary);}
  .px{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);}
</style></head>
<body><div class="card">
  <h4>Spacing · multiples of 4</h4>
  <div class="row">
    <div class="step"><div class="bar" style="height:4px;"></div><div class="label">1</div><div class="px">4px</div></div>
    <div class="step"><div class="bar" style="height:8px;"></div><div class="label">2</div><div class="px">8px</div></div>
    <div class="step"><div class="bar" style="height:12px;"></div><div class="label">3</div><div class="px">12px</div></div>
    <div class="step"><div class="bar" style="height:16px;"></div><div class="label">4</div><div class="px">16px</div></div>
    <div class="step"><div class="bar" style="height:24px;"></div><div class="label">6</div><div class="px">24px</div></div>
    <div class="step"><div class="bar" style="height:32px;"></div><div class="label">8</div><div class="px">32px</div></div>
    <div class="step"><div class="bar" style="height:48px;"></div><div class="label">12</div><div class="px">48px</div></div>
    <div class="step"><div class="bar" style="height:64px;"></div><div class="label">16</div><div class="px">64px</div></div>
    <div class="step"><div class="bar" style="height:80px;"></div><div class="label">20</div><div class="px">80px</div></div>
    <div class="step"><div class="bar" style="height:100px;"></div><div class="label">24</div><div class="px">100px</div></div>
    <div class="step"><div class="bar" style="height:120px;"></div><div class="label">32</div><div class="px">120px</div></div>
  </div>
</div></body></html>
