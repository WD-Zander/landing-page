<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-elevated);font-family:var(--font-body);color:var(--text-secondary);}
  .card{padding:30px 24px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
  h4{font-family:var(--font-display);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-amber);margin:0 0 18px;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:0;}
  .item{text-align:center;padding:0 16px;border-right:1px solid var(--border);}
  .item:last-child{border-right:none;}
  .num{font-family:var(--font-mono);font-size:24px;font-weight:600;color:var(--accent-amber);margin-bottom:4px;line-height:1;}
  .label{font-size:11px;color:var(--text-muted);}
</style></head>
<body><div class="card">
  <h4>Trust bar · divider-separated stats</h4>
  <div class="row">
    <div class="item"><div class="num">16+</div><div class="label">Módulos integrados</div></div>
    <div class="item"><div class="num">PWA</div><div class="label">iOS y Android</div></div>
    <div class="item"><div class="num">7+</div><div class="label">Años retención</div></div>
    <div class="item"><div class="num">100%</div><div class="label">Offline-capable</div></div>
    <div class="item"><div class="num">QR</div><div class="label">Identificación física</div></div>
  </div>
</div></body></html>
