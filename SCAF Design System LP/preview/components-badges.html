<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);font-family:var(--font-body);color:var(--text-secondary);}
  .card{padding:24px;}
  h4{font-family:var(--font-display);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-amber);margin:0 0 14px;}
  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;font-family:var(--font-body);}
  .badge .dot{width:5px;height:5px;border-radius:50%;}
  .green{background:rgba(34,197,94,0.10);color:#15803d;border:1px solid rgba(34,197,94,0.20);}
  .green .dot{background:#22c55e;}
  .amber{background:rgba(234,179,8,0.10);color:#b45309;border:1px solid rgba(234,179,8,0.22);}
  .amber .dot{background:#eab308;}
  .red{background:rgba(239,68,68,0.10);color:#b91c1c;border:1px solid rgba(239,68,68,0.20);}
  .red .dot{background:#ef4444;}
  .chip-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:999px;font-family:var(--font-display);font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#f59e0b;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.25);}
  .chip-pill .pulse{width:6px;height:6px;border-radius:50%;background:#f59e0b;}
  .src-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:999px;font-family:var(--font-mono);font-size:10px;color:#5a5a72;border:1px solid rgba(255,255,255,0.06);}
  .label{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:10px;}
  .group{display:flex;flex-direction:column;gap:6px;align-items:flex-start;}
</style></head>
<body><div class="card">
  <h4>Badges & pills</h4>
  <div class="row">
    <div class="group">
      <div class="row">
        <span class="badge green"><span class="dot"></span>Activo</span>
        <span class="badge amber"><span class="dot"></span>En Mant.</span>
        <span class="badge red"><span class="dot"></span>Vencido</span>
      </div>
      <span class="label">status · 3px·10px pad · pill · 11px</span>
    </div>
    <div class="group">
      <span class="chip-pill"><span class="pulse"></span>Sistema ERP de Gestión de Activos</span>
      <span class="label">hero badge · pulsing dot</span>
    </div>
    <div class="group">
      <span class="src-chip">Fuente: Deloitte Plant Maintenance Survey</span>
      <span class="label">attribution chip · mono · muted</span>
    </div>
  </div>
</div></body></html>
