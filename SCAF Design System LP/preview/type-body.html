<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);font-family:var(--font-body);color:var(--text-secondary);}
  .card{padding:24px;display:flex;align-items:center;gap:32px;}
  .specimen{font-family:var(--font-body);font-weight:400;font-size:48px;line-height:1.1;color:var(--text-primary);}
  .specimen .light{color:var(--text-secondary);font-weight:400;}
  .meta{flex:1;}
  .meta h4{font-family:var(--font-display);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-amber);margin:0 0 6px;}
  .meta .name{font-family:var(--font-heading);font-weight:700;font-size:20px;color:var(--text-primary);margin-bottom:4px;}
  .meta .use{font-size:12.5px;line-height:1.55;margin-bottom:10px;}
  .meta code{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);background:var(--bg-elevated);padding:3px 7px;border-radius:4px;border:1px solid var(--border);}
  .demo{font-family:var(--font-body);font-size:13px;line-height:1.65;color:var(--text-secondary);max-width:260px;margin-top:8px;}
</style></head>
<body><div class="card">
  <div class="specimen"><span class="light">Aa</span> 1234</div>
  <div class="meta">
    <h4>Body · DM Sans</h4>
    <div class="name">Paragraphs, UI text, lists</div>
    <div class="use">Default <code>0.92rem</code>, line-height <code>1.65</code>. Body color is <code>--text-secondary</code> not pure white. Weights 400 / 500 / 700.</div>
    <p class="demo">SCAF unifica inventario, mantenimiento preventivo, tickets, personal y operaciones en una sola plataforma.</p>
  </div>
</div></body></html>
