<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);font-family:var(--font-body);color:var(--text-secondary);}
  .card{padding:20px 24px;}
  h4{font-family:var(--font-display);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-amber);margin:0 0 14px;}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .swatch{border-radius:10px;padding:14px;border:1px solid var(--border);min-height:90px;display:flex;flex-direction:column;justify-content:space-between;}
  .swatch .name{font-family:var(--font-heading);font-weight:700;font-size:14px;}
  .swatch .hex{font-family:var(--font-mono);font-size:10px;opacity:0.9;}
  .swatch .var{font-family:var(--font-mono);font-size:9.5px;opacity:0.65;}
  .primary{background:linear-gradient(135deg,#f59e0b,#d97706);color:#0a0a0f;border:none;box-shadow:0 0 30px rgba(245,158,11,0.25);}
  .copper{background:#d97706;color:#fff;}
  .glow{background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.25);}
</style></head>
<body><div class="card">
  <h4>Brand · amber accent</h4>
  <div class="row">
    <div class="swatch primary"><span class="name">accent amber</span><div><div class="hex">#f59e0b</div><div class="var">--accent-amber · primary CTA only</div></div></div>
    <div class="swatch copper"><span class="name">copper</span><div><div class="hex">#d97706</div><div class="var">--accent-copper · gradient bottom</div></div></div>
    <div class="swatch glow"><span class="name">amber glow</span><div><div class="hex">rgba 0.15</div><div class="var">--accent-amber-glow · tint bg</div></div></div>
  </div>
</div></body></html>
