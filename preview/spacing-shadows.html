<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);font-family:var(--font-body);color:var(--text-secondary);}
  .card{padding:30px 24px;}
  h4{font-family:var(--font-display);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-amber);margin:0 0 24px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;}
  .demo{height:80px;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font-heading);font-weight:700;font-size:13px;color:var(--text-primary);}
  .label{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-align:center;margin-top:10px;}
  .glow{background:linear-gradient(135deg,#f59e0b,#d97706);color:#0a0a0f;box-shadow:0 0 30px rgba(245,158,11,0.25),0 4px 12px rgba(0,0,0,0.3);}
  .card-shadow{box-shadow:0 12px 30px -8px rgba(0,0,0,0.5);}
  .card-hover{box-shadow:0 20px 40px -10px rgba(0,0,0,0.55);border-color:rgba(255,255,255,0.10);}
  .mockup{box-shadow:0 24px 60px -15px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.05);background:#fcfcfc;color:#0f172a;border:1px solid #e4e4e7;}
</style></head>
<body><div class="card">
  <h4>Shadows · elevation</h4>
  <div class="row">
    <div>
      <div class="demo">none</div>
      <div class="label">rest state</div>
    </div>
    <div>
      <div class="demo card-shadow">card</div>
      <div class="label">0 12 30 -8 / 30%</div>
    </div>
    <div>
      <div class="demo card-hover">hover</div>
      <div class="label">0 20 40 -10 / 40% + amber border</div>
    </div>
    <div>
      <div class="demo mockup">mockup</div>
      <div class="label">0 24 60 -15 / 50% + rim</div>
    </div>
  </div>
  <div style="margin-top:24px;display:grid;grid-template-columns:1fr 1fr;gap:22px;">
    <div>
      <div class="demo glow">amber glow (CTA)</div>
      <div class="label">0 0 30 rgba(amber,0.25) + 0 4 12 black</div>
    </div>
    <div>
      <div class="demo glow" style="box-shadow:0 0 40px rgba(245,158,11,0.4),0 6px 20px rgba(0,0,0,0.4);">amber glow · hover</div>
      <div class="label">0 0 40 rgba(amber,0.4) + 0 6 20 black</div>
    </div>
  </div>
</div></body></html>
