<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);font-family:var(--font-body);color:var(--text-secondary);}
  .card{padding:20px 24px;}
  h4{font-family:var(--font-display);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-amber);margin:0 0 14px;}
  .frame{background:#fcfcfc;border-radius:10px;border:1px solid #e4e4e7;box-shadow:0 24px 60px -15px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.05);overflow:hidden;font-family:var(--font-heading);color:#09090b;max-width:560px;margin:0 auto;}
  .titlebar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:#f4f4f5;border-bottom:1px solid #e4e4e7;}
  .dot{width:8px;height:8px;border-radius:50%;}
  .dot.r{background:#ef4444;}.dot.y{background:#eab308;}.dot.g{background:#22c55e;}
  .title{flex:1;text-align:center;font-size:9px;color:#71717a;font-family:var(--font-body);}
  .body{display:flex;}
  .sidebar{width:42px;background:#0f172a;display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:8px;}
  .sb{width:22px;height:3px;border-radius:2px;background:rgba(255,255,255,0.15);}
  .sb.active{background:rgba(255,255,255,0.7);}
  .main{flex:1;padding:12px;}
  .h{font-size:11px;font-weight:700;margin-bottom:8px;}
  .kpis{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;}
  .kpi{background:#fff;border:1px solid #e4e4e7;border-radius:6px;padding:8px;}
  .kpi .l{font-size:8px;color:#71717a;font-family:var(--font-body);margin-bottom:3px;}
  .kpi .v{font-family:var(--font-mono);font-size:14px;font-weight:600;}
</style></head>
<body><div class="card">
  <h4>Mock frame · dark site's only "imagery"</h4>
  <div class="frame">
    <div class="titlebar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="title">SCAF — Dashboard</span>
    </div>
    <div class="body">
      <div class="sidebar"><div class="sb active"></div><div class="sb"></div><div class="sb"></div><div class="sb"></div><div class="sb"></div><div class="sb"></div></div>
      <div class="main">
        <div class="h">Dashboard Ejecutivo</div>
        <div class="kpis">
          <div class="kpi"><div class="l">Total activos</div><div class="v" style="color:#2563eb;">1,247</div></div>
          <div class="kpi"><div class="l">Valor cartera</div><div class="v" style="color:#15803d;">$2.4M</div></div>
          <div class="kpi"><div class="l">Mant. hoy</div><div class="v" style="color:#b45309;">12</div></div>
          <div class="kpi"><div class="l">Vencidos</div><div class="v" style="color:#b91c1c;">3</div></div>
        </div>
      </div>
    </div>
  </div>
</div></body></html>
