<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);font-family:var(--font-body);color:var(--text-secondary);}
  .card{padding:20px 24px;}
  h4{font-family:var(--font-display);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-amber);margin:0 0 14px;}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .swatch{border-radius:10px;padding:14px;border:1px solid var(--border);min-height:100px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;}
  .swatch .name{font-family:var(--font-heading);font-weight:700;font-size:14px;}
  .swatch .hex{font-family:var(--font-mono);font-size:10px;opacity:0.9;}
  .swatch .var{font-family:var(--font-mono);font-size:9.5px;opacity:0.7;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:10.5px;font-weight:600;font-family:var(--font-body);}
  .chip .dot{width:5px;height:5px;border-radius:50%;}
</style></head>
<body><div class="card">
  <h4>Status · pips & state chips</h4>
  <div class="row">
    <div class="swatch" style="background:#22c55e;">
      <span class="name">green · OK</span>
      <div>
        <span class="chip" style="background:rgba(255,255,255,0.18);color:#fff;"><span class="dot" style="background:#fff;"></span>Activo</span>
        <div class="hex" style="margin-top:8px;">#22c55e &nbsp;·&nbsp; deep #15803d</div>
      </div>
    </div>
    <div class="swatch" style="background:#eab308;">
      <span class="name">amber · warn</span>
      <div>
        <span class="chip" style="background:rgba(255,255,255,0.18);color:#0a0a0f;"><span class="dot" style="background:#0a0a0f;"></span>En Mant.</span>
        <div class="hex" style="margin-top:8px;color:#0a0a0f;">#eab308 &nbsp;·&nbsp; deep #b45309</div>
      </div>
    </div>
    <div class="swatch" style="background:#ef4444;">
      <span class="name">red · bad</span>
      <div>
        <span class="chip" style="background:rgba(255,255,255,0.18);color:#fff;"><span class="dot" style="background:#fff;"></span>Vencido</span>
        <div class="hex" style="margin-top:8px;">#ef4444 &nbsp;·&nbsp; deep #b91c1c</div>
      </div>
    </div>
  </div>
</div></body></html>
