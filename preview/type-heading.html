<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);font-family:var(--font-body);color:var(--text-secondary);}
  .card{padding:24px;display:flex;align-items:center;gap:32px;}
  .specimen{font-family:var(--font-heading);font-weight:800;font-size:64px;line-height:1;color:var(--text-primary);letter-spacing:-0.03em;}
  .specimen .grad{background:linear-gradient(135deg,#f59e0b,#fbbf24);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .meta{flex:1;}
  .meta h4{font-family:var(--font-display);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-amber);margin:0 0 6px;}
  .meta .name{font-family:var(--font-heading);font-weight:700;font-size:20px;color:var(--text-primary);margin-bottom:4px;}
  .meta .use{font-size:12.5px;line-height:1.55;margin-bottom:10px;}
  .meta code{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);background:var(--bg-elevated);padding:3px 7px;border-radius:4px;border:1px solid var(--border);}
</style></head>
<body><div class="card">
  <div class="specimen">Aa<span class="grad">.</span></div>
  <div class="meta">
    <h4>Heading · Outfit</h4>
    <div class="name">H1 → H4, logo, step numbers</div>
    <div class="use">Sentence case, periods are stylistic. H1 = <code>800</code> weight, tracking <code>-0.03em</code>, sizes from 1.5rem (H3) up to <code>clamp(2.4rem,4.5vw,3.6rem)</code> (H1). One word per H1 gets the amber gradient.</div>
    <code>--font-heading</code> &nbsp; <code>weights: 700 / 800</code>
  </div>
</div></body></html>
