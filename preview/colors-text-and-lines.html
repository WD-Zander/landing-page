<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);font-family:var(--font-body);color:var(--text-secondary);}
  .card{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
  .col h4{font-family:var(--font-display);font-size:10.5px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-amber);margin:0 0 10px;}
  .swatch{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
  .chip{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);}
  .name{font-family:var(--font-heading);font-weight:600;font-size:12px;color:var(--text-primary);}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-left:auto;}
  .preview{margin-top:8px;padding:10px 12px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;}
  .preview h1{font-family:var(--font-heading);font-weight:800;font-size:14px;margin:0 0 4px;color:#f0f0f5;}
  .preview p{font-size:11px;margin:0;color:#a0a0b4;}
  .preview small{font-family:var(--font-mono);font-size:9.5px;color:#5a5a72;}
</style></head>
<body><div class="card">
  <div class="col">
    <h4>Text color</h4>
    <div class="swatch"><span class="chip" style="background:#f0f0f5;"></span><span class="name">primary</span><span class="hex">#f0f0f5</span></div>
    <div class="swatch"><span class="chip" style="background:#a0a0b4;"></span><span class="name">secondary</span><span class="hex">#a0a0b4</span></div>
    <div class="swatch"><span class="chip" style="background:#5a5a72;"></span><span class="name">muted</span><span class="hex">#5a5a72</span></div>
  </div>
  <div class="col">
    <h4>Lines & glass</h4>
    <div class="swatch"><span class="chip" style="background:rgba(255,255,255,0.06);"></span><span class="name">border</span><span class="hex">white 6%</span></div>
    <div class="swatch"><span class="chip" style="background:rgba(255,255,255,0.10);"></span><span class="name">border-accent</span><span class="hex">white 10%</span></div>
    <div class="swatch"><span class="chip" style="background:rgba(255,255,255,0.03);"></span><span class="name">glass-bg</span><span class="hex">white 3%</span></div>
  </div>
  <div class="col">
    <h4>In context</h4>
    <div class="preview">
      <h1>Headline primary</h1>
      <p>Lede secondary, ~92% size, line-height 1.65.</p>
      <small>micro muted · mono</small>
    </div>
  </div>
</div></body></html>
