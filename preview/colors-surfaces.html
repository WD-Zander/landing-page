<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);font-family:var(--font-body);color:var(--text-secondary);}
  .card{padding:20px 24px;}
  h4{font-family:var(--font-display);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-amber);margin:0 0 12px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .swatch{border-radius:8px;padding:14px 12px;border:1px solid var(--border);min-height:84px;display:flex;flex-direction:column;justify-content:space-between;}
  .swatch .name{font-family:var(--font-heading);font-weight:700;font-size:12px;color:var(--text-primary);}
  .swatch .hex{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
  .swatch .var{font-family:var(--font-mono);font-size:9.5px;color:var(--text-muted);opacity:0.7;}
</style></head>
<body><div class="card">
  <h4>Surfaces · dark stack</h4>
  <div class="row">
    <div class="swatch" style="background:#0a0a0f;"><span class="name" style="color:#fff;">bg base</span><div><div class="hex">#0a0a0f</div><div class="var">--bg-base</div></div></div>
    <div class="swatch" style="background:#111118;"><span class="name" style="color:#fff;">bg elevated</span><div><div class="hex">#111118</div><div class="var">--bg-elevated</div></div></div>
    <div class="swatch" style="background:#1a1a24;"><span class="name" style="color:#fff;">bg surface</span><div><div class="hex">#1a1a24</div><div class="var">--bg-surface</div></div></div>
    <div class="swatch" style="background:#22222e;"><span class="name" style="color:#fff;">bg hover</span><div><div class="hex">#22222e</div><div class="var">--bg-hover</div></div></div>
  </div>
</div></body></html>
