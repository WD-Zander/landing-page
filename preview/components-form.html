<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);font-family:var(--font-body);color:var(--text-secondary);}
  .card{padding:22px 24px;}
  h4{font-family:var(--font-display);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-amber);margin:0 0 14px;}
  .form{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:540px;}
  .group{display:flex;flex-direction:column;gap:6px;}
  label{font-family:var(--font-body);font-size:11px;font-weight:500;color:var(--text-secondary);}
  input,textarea{background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text-primary);font-family:var(--font-body);font-size:12px;outline:none;transition:border .2s,box-shadow .2s;}
  input::placeholder,textarea::placeholder{color:var(--text-muted);}
  input:focus,textarea:focus{border-color:rgba(245,158,11,0.4);box-shadow:0 0 0 3px rgba(245,158,11,0.1);}
  .full{grid-column:1/-1;}
  .note{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:10px;}
</style></head>
<body><div class="card">
  <h4>Form inputs</h4>
  <form class="form">
    <div class="group"><label>Nombre</label><input placeholder="Tu nombre completo"></div>
    <div class="group"><label>Email</label><input placeholder="correo@empresa.com"></div>
    <div class="group full"><label>Mensaje</label><textarea placeholder="Cuéntanos sobre tu operación..." rows="2"></textarea></div>
  </form>
  <div class="note">bg surface · border 6% · radius 6 · focus = amber border + amber 10% ring</div>
</div></body></html>
