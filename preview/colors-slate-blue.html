<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-base);font-family:var(--font-body);color:var(--text-secondary);}
  .card{padding:20px 24px;}
  h4{font-family:var(--font-display);font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-amber);margin:0 0 14px;}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .swatch{border-radius:10px;padding:14px;border:1px solid var(--border);min-height:90px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;}
  .swatch .name{font-family:var(--font-heading);font-weight:700;font-size:14px;}
  .swatch .hex{font-family:var(--font-mono);font-size:10px;opacity:0.9;}
  .swatch .var{font-family:var(--font-mono);font-size:9.5px;opacity:0.65;}
</style></head>
<body><div class="card">
  <h4>Secondary · slate blue (data only, never CTA)</h4>
  <div class="row">
    <div class="swatch" style="background:#2563eb;"><span class="name">brand blue</span><div><div class="hex">#2563eb</div><div class="var">--brand-blue · KPIs, links inside mocks</div></div></div>
    <div class="swatch" style="background:#0f172a;"><span class="name">brand slate</span><div><div class="hex">#0f172a</div><div class="var">--brand-slate · mockup sidebar</div></div></div>
    <div class="swatch" style="background:#1e293b;"><span class="name">slate 2</span><div><div class="hex">#1e293b</div><div class="var">--brand-slate-2 · gradient end</div></div></div>
  </div>
</div></body></html>
