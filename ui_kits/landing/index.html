<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCAF UI Kit — Landing</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
  <link rel="stylesheet" href="styles.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="Plans.jsx"></script>
  <script type="text/babel">
  /* @jsx React.createElement */

  // ── Inline mockup mini-pieces (re-used from source/landing-page.html) ───
  const InventoryMock = () => (
    <MockFrame title="SCAF — Inventario">
      <div style={{ fontSize: 9, fontWeight: 700, marginBottom: 6 }}>Inventario de Activos</div>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 6, padding: '6px 8px',
        border: '1px solid #e4e4e7', borderRadius: 4, marginBottom: 8, fontSize: 8.5, color: '#71717a'
      }}>
        <span style={{ width: 8, height: 8, borderRadius: '50%', border: '1.5px solid #71717a' }}></span>
        Buscar por código, nombre o serial…
      </div>
      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 8.5 }}>
        <thead>
          <tr style={{ borderBottom: '1px solid #e4e4e7', color: '#71717a' }}>
            <th style={{ textAlign: 'left', padding: '4px 0', fontWeight: 600 }}>Código</th>
            <th style={{ textAlign: 'left', padding: '4px 0', fontWeight: 600 }}>Activo</th>
            <th style={{ textAlign: 'left', padding: '4px 0', fontWeight: 600 }}>Estado</th>
          </tr>
        </thead>
        <tbody>
          {[
            ['AF-0014', 'Compresor Atlas GA-90', 'green', 'Activo'],
            ['AF-0027', 'Generador Cummins 75kVA', 'amber', 'En Mant.'],
            ['AF-0114', 'Servidor Proliant DL380', 'red', 'Vencido'],
            ['AF-0042', 'Carretilla Yale GLP', 'green', 'Activo'],
          ].map(([code, name, tone, status]) => (
            <tr key={code} style={{ borderBottom: '1px solid #f4f4f5' }}>
              <td style={{ padding: '5px 0', fontFamily: 'var(--font-mono)' }}>{code}</td>
              <td style={{ padding: '5px 0', fontWeight: 600 }}>{name}</td>
              <td style={{ padding: '5px 0' }}><Badge tone={tone}>{status}</Badge></td>
            </tr>
          ))}
        </tbody>
      </table>
    </MockFrame>
  );

  const DashboardMock = () => (
    <MockFrame title="SCAF — Dashboard">
      <div style={{ fontSize: 9, fontWeight: 700, marginBottom: 8 }}>Dashboard Ejecutivo</div>
      <div className="mock-kpi-grid">
        <KPI label="Activos totales" value="1,247" tone="blue" />
        <KPI label="Valor total (USD)" value="$2.4M" tone="green" />
        <KPI label="Mant. pendientes" value="38" tone="amber" />
        <KPI label="Alertas vencidas" value="5" tone="red" />
      </div>
      <div style={{ fontSize: 7, color: '#71717a', margin: '6px 0 4px' }}>Mantenimientos por mes</div>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 4, height: 38 }}>
        {[60, 85, 45, 72, 90, 55, 78].map((h, i) => (
          <div key={i} style={{
            flex: 1, height: `${h}%`, borderRadius: '2px 2px 0 0',
            background: i === 1 ? 'linear-gradient(to top,#f59e0b,#fbbf24)'
              : i === 4 ? 'linear-gradient(to top,#2563eb,#60a5fa)'
              : 'linear-gradient(to top,#0f172a,#1e293b)'
          }}></div>
        ))}
      </div>
    </MockFrame>
  );

  // ── Section components ──────────────────────────────────────────
  const Hero = () => (
    <section className="dsk-hero">
      <div className="dsk-hero-grid"></div>
      <div className="dsk-container dsk-hero-inner">
        <div>
          <div className="dsk-hero-badge">
            <span className="dot"></span>
            <span className="dsk-eyebrow" style={{ fontSize: '0.7rem' }}>Sistema ERP de Gestión de Activos</span>
          </div>
          <h1>Control total de tus <span className="text-gradient">activos fijos.</span> Mantenimiento sin fricción.</h1>
          <p className="dsk-hero-sub">
            SCAF unifica inventario, mantenimiento preventivo, tickets, control de personal, proveedores, auditoría y
            operaciones en una sola plataforma — con acceso offline, QR integrado y 16+ módulos interconectados.
          </p>
          <div className="dsk-hero-ctas">
            <Button variant="primary">Solicitar Demo</Button>
            <Button variant="secondary">Ver Funcionalidades</Button>
          </div>
          <div className="dsk-hero-micro">
            <span><span className="pip"></span> PWA instalable</span>
            <span><span className="pip"></span> Funciona offline</span>
            <span><span className="pip"></span> SQL Server</span>
            <span><span className="pip"></span> ISO 27001 ready</span>
          </div>
        </div>
        <DashboardMock />
      </div>
    </section>
  );

  const TrustBar = () => (
    <section className="dsk-trust-bar">
      <div className="dsk-container">
        <div className="dsk-trust-grid">
          <TrustItem value="16+" label="Módulos integrados" />
          <TrustItem value="PWA" label="Instalable iOS y Android" />
          <TrustItem value="7+" label="Años de retención auditoría" />
          <TrustItem value="100%" label="Offline-capable" />
          <TrustItem value="QR" label="Identificación física" />
        </div>
      </div>
    </section>
  );

  const Problem = () => (
    <section className="dsk-section">
      <div className="dsk-container">
        <div className="dsk-section-header">
          <Eyebrow>El Problema</Eyebrow>
          <h2>Hojas de cálculo, datos perdidos y cero trazabilidad.</h2>
        </div>
        <div className="dsk-grid-3">
          <PainCard
            icon={<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 13h6M9 17h4"/></svg>}
            title="Inventarios en Excel"
            stat="80% pierde datos al actualizar">
            Hojas dispersas, sin trazabilidad, sin control de versiones. Un archivo desactualizado es información perdida.
          </PainCard>
          <PainCard
            icon={<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v6l3 2"/></svg>}
            title="Sin historial de cambios"
            stat="0% audit trail">
            ¿Quién modificó qué? ¿Cuándo? ¿Por qué? Sin registro, no hay control. Sin control, no hay cumplimiento.
          </PainCard>
          <PainCard
            icon={<svg viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>}
            title="Mantenimiento reactivo"
            stat="10x más caro que el preventivo">
            Reparas cuando algo falla. Pagas en tiempo muerto, repuestos urgentes y horas extra. Cada falla cuesta dinero.
          </PainCard>
        </div>
      </div>
    </section>
  );

  const Features = () => (
    <section className="dsk-section" id="funcionalidades">
      <div className="dsk-container">
        <div className="dsk-section-header">
          <Eyebrow>Módulos</Eyebrow>
          <h2>Activos, mantenimiento, personal y operaciones en un solo lugar.</h2>
        </div>

        <div className="dsk-feature-block">
          <div className="dsk-feature-text">
            <Eyebrow>Inventario</Eyebrow>
            <h3>Registro inteligente de activos</h3>
            <p>Cada activo con su ciclo de vida completo: adquisición, depreciación, fotos, facturas y asignaciones. Búsqueda server-side que escala a miles de registros.</p>
            <ul className="dsk-feature-bullets">
              <li>Paginación server-side escalable</li>
              <li>Import/export masivo desde Excel</li>
              <li>Códigos QR automáticos + escaneo móvil</li>
              <li>Historial completo de cambios</li>
            </ul>
          </div>
          <div className="dsk-feature-mock"><InventoryMock /></div>
        </div>

        <div className="dsk-feature-block reverse">
          <div className="dsk-feature-text">
            <Eyebrow>Dashboard</Eyebrow>
            <h3>KPIs ejecutivos en tiempo real</h3>
            <p>Panel de control con indicadores financieros, alertas de mantenimiento vencido, órdenes activas y feed de actividad reciente. Toma decisiones basadas en datos, no en intuición.</p>
            <ul className="dsk-feature-bullets">
              <li>Valor total y depreciación de activos</li>
              <li>Contadores de mantenimientos por estado</li>
              <li>Feed de actividad en tiempo real</li>
              <li>Alertas de vencimiento automáticas</li>
            </ul>
          </div>
          <div className="dsk-feature-mock"><DashboardMock /></div>
        </div>
      </div>
    </section>
  );

  const ECO = [
    { icon: '☐', color: '#3b82f6', name: 'Inventario de Activos', desc: 'CRUD completo, búsqueda y paginación server-side' },
    { icon: '⚇', color: '#f59e0b', name: 'Códigos QR', desc: 'Generación automática, escaneo móvil, historial' },
    { icon: '⇄', color: '#8b5cf6', name: 'Movimientos', desc: 'Trazabilidad from/to con diff visual' },
    { icon: '👤', color: '#22c55e', name: 'Empleados', desc: 'Directorio con cédula, cargo, departamento' },
    { icon: '⟲', color: '#0ea5e9', name: 'Asignaciones', desc: 'Check-in / check-out de equipos a custodios' },
    { icon: '⚙', color: '#ec4899', name: 'Multi-Scope', desc: 'Módulos dinámicos: Áreas, Equipos, Flota...' },
    { icon: '📋', color: '#f97316', name: 'Tickets Mant.', desc: 'Crear, asignar, completar con estados y progreso' },
    { icon: '📝', color: '#14b8a6', name: 'Planes y Rutinas', desc: 'Templates con frecuencias y checklist' },
    { icon: '📅', color: '#6366f1', name: 'Programación', desc: 'Asigna rutinas a activos con frecuencia' },
    { icon: '☰', color: '#2563eb', name: 'Órdenes de Trabajo', desc: 'Multi-tarea con Gantt y mini-calendario' },
    { icon: '📆', color: '#a855f7', name: 'Calendario', desc: 'Vista mensual interactiva por scope' },
    { icon: '📈', color: '#eab308', name: 'Timeline', desc: '12 meses × activos con barras de ejecución' },
    { icon: '☑', color: '#10b981', name: 'Agenda Operador', desc: 'Hoy / semana / mes con checklist' },
    { icon: '🕑', color: '#ef4444', name: 'Reprogramaciones', desc: 'Historial de cambios con motivo y autor' },
    { icon: '🚚', color: '#64748b', name: 'Proveedores', desc: 'Directorio de vendors con contacto y contratos' },
    { icon: '📊', color: '#0ea5e9', name: 'Dashboard', desc: 'KPIs, valor total, alertas y activity feed' },
    { icon: '🔒', color: '#f59e0b', name: 'Auditoría ISO', desc: 'Log inmutable, 7+ años retención' },
    { icon: '👥', color: '#8b5cf6', name: 'Usuarios y RBAC', desc: '15+ permisos granulares por rol' },
  ];

  const Ecosystem = () => (
    <section className="dsk-section elevated" id="ecosistema">
      <div className="dsk-container">
        <div className="dsk-section-header">
          <Eyebrow>Ecosistema Completo</Eyebrow>
          <h2>16+ módulos integrados en una sola plataforma.</h2>
          <p>Cada módulo se comunica con los demás. No son herramientas aisladas — es un sistema de información unificado.</p>
        </div>
        <div className="dsk-grid-4">
          {ECO.map(e => <EcoCard key={e.name} {...e} />)}
        </div>
      </div>
    </section>
  );

  const Differentiators = () => (
    <section className="dsk-section" id="diferenciadores">
      <div className="dsk-container">
        <div className="dsk-section-header">
          <Eyebrow>Por qué SCAF</Eyebrow>
          <h2>Lo que nos diferencia de cualquier otra solución.</h2>
        </div>
        <div className="dsk-grid-3">
          <DiffCard icon="⚇" tone="blue" title="PWA Nativa">Instala SCAF como app nativa en iOS y Android. Sin App Store, sin actualizaciones. Service Worker para funcionar 100% offline.</DiffCard>
          <DiffCard icon="▢" tone="amber" title="QR Integrado">Cada activo recibe su etiqueta QR. Escanea con la cámara para acceder al historial, movimientos, estado y documentos.</DiffCard>
          <DiffCard icon="☰" tone="green" title="Multi-Scope Dinámico">Crea módulos de mantenimiento ilimitados, cada uno con su propio ecosistema de tickets, planes y calendario.</DiffCard>
          <DiffCard icon="👥" tone="blue" title="Control de Personal">Empleados, asignación con custodia, proveedores y RBAC con 15+ permisos granulares por pantalla y acción.</DiffCard>
          <DiffCard icon="📋" tone="green" title="Importación Masiva">Importa activos, planes y empleados desde Excel. Mapeo de columnas configurable. Migra en minutos.</DiffCard>
          <DiffCard icon="⚠" tone="amber" wide highlight title="Auditoría ISO 27001">
            Registro inmutable de cada acción del sistema. Retención de 7 años configurable. Usuarios, timestamps, entidades y descripciones — todo listo para auditorías de cumplimiento externas. Exportable a CSV.
          </DiffCard>
        </div>
      </div>
    </section>
  );

  const HowItWorks = () => (
    <section className="dsk-section">
      <div className="dsk-container">
        <div className="dsk-section-header">
          <Eyebrow>Proceso</Eyebrow>
          <h2>Tres pasos para el control total.</h2>
        </div>
        <div className="dsk-grid-3">
          <StepRow n="1" title="Registra">Carga activos, empleados, proveedores y estructura organizacional. Importa masivamente desde Excel o registra uno a uno.</StepRow>
          <StepRow n="2" title="Programa">Crea módulos por scope, define planes con frecuencias, asigna rutinas a activos y genera órdenes automáticamente.</StepRow>
          <StepRow n="3" title="Controla">Dashboard ejecutivo, agenda del operador, auditoría ISO de 7 años y trazabilidad completa de cada acción.</StepRow>
        </div>
      </div>
    </section>
  );

  const Contact = () => (
    <section className="dsk-section elevated" id="contacto">
      <div className="dsk-container" style={{ maxWidth: 720 }}>
        <div className="dsk-section-header">
          <Eyebrow>Empieza Hoy</Eyebrow>
          <h2>Transforma la gestión de tus activos.</h2>
          <p>Agenda una demo personalizada y descubre cómo SCAF puede reducir costos de mantenimiento y garantizar cumplimiento.</p>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
          <ContactCard kind="wa" label="WhatsApp" value="+58 412-498-2079" hint="Respuesta en menos de 2 horas" href="https://wa.me/584124982079" />
          <ContactCard kind="em" label="Correo" value="info@scaf.app" hint="Cotizaciones y documentación formal" href="mailto:info@scaf.app" />
        </div>
      </div>
    </section>
  );

  const App = () => (
    <React.Fragment>
      <Nav active="func" />
      <Hero />
      <TrustBar />
      <Problem />
      <Features />
      <Ecosystem />
      <Plans />
      <Differentiators />
      <HowItWorks />
      <Contact />
      <Footer />
    </React.Fragment>
  );

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
